<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <defs>
    <radialGradient id="iconBg" cx="38%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#60c8ff"/>
      <stop offset="55%" stop-color="#2196f3"/>
      <stop offset="100%" stop-color="#1155cc"/>
    </radialGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c8e8ff"/>
      <stop offset="45%"  stop-color="#90d0ff"/>
      <stop offset="100%" stop-color="#2196f3"/>
    </linearGradient>
  </defs>

  <!-- Circle icon -->
  <circle cx="40" cy="40" r="38" fill="url(#iconBg)"/>
  <text
    x="40" y="54"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="36"
    fill="white"
    letter-spacing="-1"
  >Ap</text>

  <!-- Wordmark: Apply (light) + flow. (gradient blue) -->
  <text
    x="91" y="52"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="30"
    letter-spacing="-0.5"
    fill="url(#wordGrad)"
  >Apply<tspan fill="#2196f3">flow.</tspan></text>
</svg>
